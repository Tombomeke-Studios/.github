name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card (tombomeke-ehb)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=tombomeke-ehb&show_icons=true&theme=github_dark&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card (tombomeke-ehb)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=tombomeke-ehb&layout=compact&theme=github_dark&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate stats card (tombomeke)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=tombomeke&show_icons=true&theme=github_dark&hide_border=true
          path: profile/tombomeke-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card (tombomeke)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=tombomeke&layout=compact&theme=github_dark&hide_border=true
          path: profile/tombomeke-top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
